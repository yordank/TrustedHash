<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="">
    <title>BTC Notar — Доказва авторство и дата чрез Bitcoin</title>
    <link rel="icon" href="data:,">

    <style>
        .brand-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            height: 60px;
            object-fit: cover;
        }

        .brand-text h1 {
            margin: 0;
            line-height: 1.1;
        }

        .brand-text p {
            margin: 4px 0 0;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .logo {
                height: 40px;
            }
        }

        :root {
            --btc: #f7931a;
            --bg0: #0b0e13;
            --bg1: #121722;
            --card: #171c28;
            --line: #242b3d;
            --text: #f2f4f8;
            --muted: #9aa4bf;
            --good: #2ecc71;
            --bad: #ff5c7a;
            --radius: 18px;
            --shadow: 0 20px 60px rgba(0,0,0,.55);
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui,Segoe UI,Roboto;
            background: radial-gradient(900px 420px at 75% 0%,rgba(247,147,26,.14),transparent 60%), radial-gradient(700px 380px at 20% 10%,rgba(247,147,26,.08),transparent 60%), linear-gradient(180deg,var(--bg1),var(--bg0));
            color: var(--text);
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            background: rgba(11,14,19,.90);
            border-bottom: 1px solid var(--line);
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand h1 {
            margin: 0;
            color: var(--btc);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: .2px;
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px
        }

        .brand .motto {
            margin: 6px 0 0;
            color: #d6dcf0;
            font-size: 12px;
            opacity: .92;
        }

            .brand .motto strong {
                color: var(--btc);
            }

        select, button, input, textarea {
            background: #0f1420;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
        }

        select {
            width: auto;
            padding-right: 36px;
        }

        button {
            font-weight: 800;
            cursor: pointer;
            border: none;
        }

            button.primary {
                background: linear-gradient(180deg,#ffb347,var(--btc));
                color: #000;
                box-shadow: 0 10px 30px rgba(247,147,26,.18);
            }

            button.warn {
                background: linear-gradient(180deg,#ffd27a,#f9a825);
                color: #000;
                box-shadow: 0 10px 30px rgba(249,168,37,.14);
            }

            button:disabled {
                opacity: .45;
                cursor: not-allowed;
                filter: grayscale(40%);
                box-shadow: none;
            }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .card {
            background: linear-gradient(180deg,#1a2030,#141a26);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

            .card .hd {
                padding: 16px;
                border-bottom: 1px solid var(--line)
            }

                .card .hd h2 {
                    margin: 0;
                    font-size: 15px
                }

                .card .hd small {
                    color: var(--muted);
                    font-size: 12px
                }

            .card .bd {
                padding: 16px
            }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-top: 10px
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .status {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 12px;
            margin-top: 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(15,20,32,.55);
        }

        .badge {
            font-size: 12px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.06);
        }

            .badge.good {
                color: var(--good)
            }

            .badge.bad {
                color: var(--bad)
            }

            .badge.neutral {
                color: var(--btc)
            }

        .mono {
            font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
            word-break: break-all;
            line-height: 1.3;
        }

        a.mempool {
            color: var(--btc);
            font-weight: 900;
            display: inline-block;
            margin-top: 12px;
            text-decoration: none;
        }

            a.mempool:hover {
                text-decoration: underline
            }

        /* QR + invoice */
        .qrwrap {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            width: 100%;
        }

        #qrImg {
            width: 220px;
            height: 220px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: #fff;
        }

        #bolt11 {
            flex: 1;
            min-height: 220px;
            resize: none;
        }

        .smallhint {
            color: var(--muted);
            font-size: 12px;
            margin-top: 8px;
        }


        /* Tabs */

        /* How-to list */
        .how {
            margin: 0;
            padding-left: 18px;
            line-height: 1.5;
        }

            .how li {
                margin: 10px 0;
            }

        .tabs {
            display: flex;
            gap: 10px;
            padding-top: 10px;
            padding-bottom: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            background: #0f1420;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            flex: 0 0 auto;
        }

            .tab.active {
                background: linear-gradient(180deg,#ffb347,var(--btc));
                color: #000;
                box-shadow: 0 10px 30px rgba(247,147,26,.12);
                border-color: rgba(0,0,0,.0);
            }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
            }


        /* Icon list */
        .icon-list {
            list-style: none;
            padding: 0;
            margin: 12px 0 0;
        }

            .icon-list li {
                display: flex;
                gap: 10px;
                align-items: flex-start;
                margin: 10px 0;
            }

            .icon-list .icon {
                font-size: 18px;
                line-height: 1.2;
            }


        /* Mobile-first improvements */
        html {
            -webkit-text-size-adjust: 100%;
        }

        /* Better tap + scroll on mobile */
        button, select, input, textarea {
            touch-action: manipulation;
        }

        /* Safe-area padding for notched devices */
        body {
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* Make tabs area feel like part of the sticky header on scroll */
        nav.tabs {
            position: sticky;
            top: 70px; /* below header */
            z-index: 9;
            backdrop-filter: blur(10px);
            background: rgba(11,14,19,.80);
            border-bottom: 1px solid var(--line);
        }


        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
        }

            .modal.show {
                display: block;
            }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.65);
            backdrop-filter: blur(4px);
        }

        .modal-card {
            position: relative;
            max-width: 520px;
            margin: 10vh auto;
            background: linear-gradient(180deg,#1a2030,#141a26);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

            .modal-card h2 {
                margin-top: 0;
            }

        .modal-note {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .modal-btn {
            width: 100%;
            margin-top: 16px;
        }


        /* Mobile menu */
        .menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(15,20,32,.75);
            cursor: pointer;
            flex: 0 0 auto;
        }

        .menu-icon {
            width: 18px;
            height: 2px;
            background: var(--text);
            border-radius: 999px;
            position: relative;
            display: inline-block;
        }

            .menu-icon::before,
            .menu-icon::after {
                content: "";
                position: absolute;
                left: 0;
                width: 18px;
                height: 2px;
                background: var(--text);
                border-radius: 999px;
            }

            .menu-icon::before {
                top: -6px;
            }

            .menu-icon::after {
                top: 6px;
            }

        .menu-panel {
            display: none;
            width: 100%;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(15,20,32,.92);
            box-shadow: var(--shadow);
            margin-top: 10px;
        }

            .menu-panel.open {
                display: grid;
                gap: 10px;
            }

        .menu-item {
            width: 100%;
            text-align: left;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(15,20,32,.55);
            color: var(--text);
            font-weight: 800;
            cursor: pointer;
        }

            .menu-item.active {
                background: linear-gradient(180deg,#ffb347,var(--btc));
                color: #000;
                border-color: rgba(0,0,0,0);
            }


        /* Wizard */
        .wizard {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .wizard-step {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(15,20,32,.5);
            color: var(--muted);
            font-weight: 800;
            font-size: 13px;
        }

            .wizard-step .num {
                width: 22px;
                height: 22px;
                border-radius: 999px;
                background: #2a2f3d;
                display: grid;
                place-items: center;
                font-size: 12px;
                flex: 0 0 auto;
            }

            .wizard-step.active {
                background: linear-gradient(180deg,#ffb347,var(--btc));
                color: #000;
                box-shadow: 0 10px 30px rgba(247,147,26,.12);
                border-color: rgba(0,0,0,.0);
            }

                .wizard-step.active .num {
                    background: #000;
                    color: #fff;
                }

        .wizard-help {
            font-size: 13px;
            color: var(--muted);
            margin: 0 0 14px 0;
        }


        /* Wizard done */
        .wizard-step .ok {
            display: none;
        }

        .wizard-step.done {
            color: var(--text);
        }

            .wizard-step.done .num {
                background: rgba(15,20,32,.85);
                color: var(--text);
            }

            .wizard-step.done .n {
                display: none;
            }

            .wizard-step.done .ok {
                display: inline;
                font-size: 12px;
            }

        /* --- Responsive rules --- */
        @media (max-width:1024px) {
            .grid {
                grid-template-columns: 1fr
            }
        }


        @media (max-width:640px) {
            /* Wizard stack */
            .wizard {
                flex-direction: column;
            }

            .wrap {
                padding: 12px;
            }
    </style>
</head>

<body>
    <header>
        <div class="wrap topbar">
            <div class="brand">
                <div class="brand-row">
                    <img src="logo.png" alt="BTC Notar logo" class="logo">
                    <div class="brand-text">
                        <h1 id="t_title"></h1>
                        <p id="t_subtitle"></p>
                    </div>
                </div>
                <p id="t_motto" class="motto"></p>
            </div>
            <select id="langSelect" aria-label="Language">
                <option value="en">EN</option>
                <option value="bg">BG</option>
                <option value="de">DE</option>
            </select>
        </div>
    </header>

    <nav class="wrap tabs" aria-label="Navigation">
        <button class="menu-btn" id="menuBtn" type="button" aria-label="Menu" aria-expanded="false">
            <span class="menu-icon" aria-hidden="true"></span>
        </button>


        <button class="tab active" id="tabBtn_app" data-tab="app" type="button"></button>
        <button class="tab" id="tabBtn_about" data-tab="about" type="button"></button>
        <button class="tab" id="tabBtn_how" data-tab="how" type="button"></button>


        <div class="menu-panel" id="menuPanel" aria-label="Mobile menu">
            <button class="menu-item" data-tab="app" type="button" id="menuItem_app"></button>
            <button class="menu-item" data-tab="about" type="button" id="menuItem_about"></button>
            <button class="menu-item" data-tab="how" type="button" id="menuItem_how"></button>
        </div>
    </nav>

    <main class="wrap">

        <!-- APP -->
        <section id="tab-app" class="tab-content active">

            <!-- WIZARD -->
            <div class="wizard" aria-label="Wizard">
                <div class="wizard-step active" data-step="1">
                    <span class="num"><span class="n">1</span><span class="ok">✔</span></span>
                    <span class="txt" id="t_wizS1"></span>
                </div>
                <div class="wizard-step" data-step="2">
                    <span class="num"><span class="n">2</span><span class="ok">✔</span></span>
                    <span class="txt" id="t_wizS2"></span>
                </div>
                <div class="wizard-step" data-step="3">
                    <span class="num"><span class="n">3</span><span class="ok">✔</span></span>
                    <span class="txt" id="t_wizS3"></span>
                </div>
            </div>
            <p class="wizard-help" id="t_wizHelp"></p>

            <div class="grid">

                <!-- CREATE -->
                <section class="card">
                    <div class="hd">
                        <h2 id="t_createTitle"></h2>
                        <small id="t_createDesc"></small>
                    </div>
                    <div class="bd">

                        <label id="t_fileLabel"></label>
                        <input id="fileIn" type="file" />

                        <label style="display:none" id="t_textLabel"></label>
                        <textarea style="display:none" id="textIn" rows="4" placeholder="" style="width:100%"></textarea>

                        <label id="t_hashLabel"></label>
                        <input id="hashIn" class="mono" placeholder="64-hex SHA-256..." style="width:100%" />


                        <div class="row">
                            <button class="primary" id="btnHash"></button>
                            <button class="warn" id="btnPay" disabled></button>
                        </div>

                        <div class="status">
                            <span class="badge neutral" id="payBadge">IDLE</span>
                            <div id="payMsg"></div>
                        </div>

                        <div id="qrRow" style="display:none;margin-top:12px">
                            <div class="qrwrap">
                                <img id="qrImg" alt="Lightning invoice QR" />
                                <div style="flex:1;min-width:0">
                                    <textarea id="bolt11" class="mono" readonly></textarea>
                                    <div class="smallhint" id="t_invoiceHint"></div>
                                </div>
                            </div>
                        </div>

                        <label id="t_shaOutLabel"></label>
                        <div id="outHash" class="mono">—</div>
                    </div>
                </section>

                <!-- VERIFY -->
                <section class="card">
                    <div class="hd">
                        <h2 id="t_verifyTitle"></h2>
                        <small>mempool.space</small>
                    </div>
                    <div class="bd">
                        <label id="t_txidLabel"></label>
                        <input id="txid" placeholder="64-hex TXID..." />

                        <div class="row">
                            <button class="primary" id="btnVerify" disabled></button>
                        </div>

                        <div id="verifyBox" class="status" style="display:none">
                            <span class="badge neutral" id="verifyBadge"></span>
                            <div id="verifyMsg"></div>
                        </div>

                        <a id="mempoolLink" class="mempool" target="_blank" rel="noreferrer" style="display:none">
                            <span id="t_viewMempool"></span>
                        </a>
                    </div>
                </section>

            </div>
        </section>


        <!-- ABOUT -->
        <section id="tab-about" class="tab-content">
            <section class="card">
                <div class="hd">
                    <h2 id="t_aboutTitle"></h2>
                    <small id="t_aboutSubtitle"></small>
                </div>
                <div class="bd">
                    <p id="t_aboutP1"></p>
                    <p id="t_aboutP2"></p>
                    <ul class="icon-list">
                        <li><span class="icon">✍️</span><span id="t_aboutL1"></span></li>
                        <li><span class="icon">📄</span><span id="t_aboutL2"></span></li>
                        <li><span class="icon">🔎</span><span id="t_aboutL3"></span></li>
                    </ul>
                </div>

                <section class="card" style="margin-top:14px">
                    <div class="hd">
                        <h2 id="t_forWhoTitle"></h2>
                        <small id="t_forWhoSubtitle"></small>
                    </div>
                    <div class="bd">
                        <ul class="icon-list">
                            <li><span class="icon">⚖️</span><span id="t_forWho1"></span></li>
                            <li><span class="icon">🧑‍💻</span><span id="t_forWho2"></span></li>
                            <li><span class="icon">📸</span><span id="t_forWho3"></span></li>
                            <li><span class="icon">🧠</span><span id="t_forWho4"></span></li>
                        </ul>
                    </div>
                </section>

                <div class="status" style="margin-top:14px">
                    <span class="badge neutral">ℹ️</span>
                    <div id="t_legalNote"></div>
                </div>

            </section>
        </section>


        <!-- HOW TO USE -->
        <section id="tab-how" class="tab-content">
            <section class="card">
                <div class="hd">
                    <h2 id="t_howTitle"></h2>
                    <small id="t_howSubtitle"></small>
                </div>
                <div class="bd">
                    <ol class="how">
                        <li><strong id="t_howS1T"></strong><br><span id="t_howS1D"></span></li>
                        <li><strong id="t_howS2T"></strong><br><span id="t_howS2D"></span></li>
                        <li><strong id="t_howS3T"></strong><br><span id="t_howS3D"></span></li>
                        <li><strong id="t_howS4T"></strong><br><span id="t_howS4D"></span></li>
                    </ol>

                    <div class="status" style="margin-top:14px">
                        <span class="badge neutral" id="t_howNoteBadge"></span>
                        <div id="t_howNote"></div>
                    </div>
                </div>
            </section>
        </section>

    </main>

        let currentLang = localStorage.getItem("lang") || "en";

        /* ================= validation + state ================= */

        /* ================= wizard ================= */

        function setWizardStep(step) {
            const s = Number(step);
            document.querySelectorAll(".wizard-step").forEach(el => {
                const n = Number(el.dataset.step);
                el.classList.toggle("active", n === s);
                el.classList.toggle("done", n < s);
            });

            const help = document.getElementById("t_wizHelp");
            if (!help) return;
            if (s === 1) help.textContent = t("wizHelp1");
            if (s === 2) help.textContent = t("wizHelp2");
            if (s === 3) help.textContent = t("wizHelp3");
        }

        function computeWizardStep() {
            const hasInput =
                ((textIn.value || "").trim().length > 0) ||
                (fileIn.files && fileIn.files[0]) ||
                isHash((hashIn.value || "").trim());

            const hasHash = isHash((outHash.textContent || "").trim());
            if (!hasInput) return 1;
            if (!hasHash) return 2;
            return 3;
        }

        function refreshWizard() {
            setWizardStep(computeWizardStep());
        }


        function smoothScrollTo(el) {
            try {
                if (!el) return;
                el.scrollIntoView({ behavior: "smooth", block: "start" });
            } catch (e) {
                // fallback
                if (el) el.scrollIntoView();
            }
        }

        function isTx(tid) { return /^[0-9a-f]{64}$/i.test((tid || "").trim()); }

            btnPay.disabled = !isHash(outHash.textContent.trim());

            /* ================= intro modal ================= */
            let introModal, modalCloseBtn;

            function applyModalLang() {
                if (!introModal || !modalCloseBtn) return;

                modalCloseBtn.textContent = t("modalBtn");
            }

            function showIntroModalIfNeeded() {
                if (!introModal) return;
                if (!localStorage.getItem("introSeen")) {
                    applyModalLang();
                    introModal.classList.add("show");
                }
            }

            function initIntroModal() {
                introModal = document.getElementById("introModal");
                modalCloseBtn = document.getElementById("modalCloseBtn");
                if (!introModal || !modalCloseBtn) return;

                // Avoid double-binding if applyLang() runs multiple times
                if (!modalCloseBtn.dataset.bound) {
                    modalCloseBtn.addEventListener("click", () => {
                        introModal.classList.remove("show");

        langSelect.value = currentLang;
        applyLang(currentLang);
        langSelect.addEventListener("change", e => applyLang(e.target.value));

        function resetPayUi() {
            payBadge.textContent = "IDLE";
            payMsg.textContent = t("payIdle");
            qrRow.style.display = "none";
            bolt11.value = "";
            qrImg.removeAttribute("src");
        }

        /* ================= hashing ================= */
        btnHash.addEventListener("click", async () => {
            const manual = (hashIn.value || "").trim();

            // 1) If user pasted a valid SHA-256, use it directly
            if (isHash(manual)) {
                outHash.textContent = manual.toLowerCase();
                resetPayUi();
                refreshWizard();
                updateButtons();
                return;
            }

            const txt = (textIn.value || "");
            const f = fileIn.files && fileIn.files[0];

            // 2) If text is provided, hash text (UTF-8)
            if (txt.trim().length > 0) {
                const enc = new TextEncoder();
                const data = enc.encode(txt);
                const buf = await crypto.subtle.digest("SHA-256", data);
                const hex = [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, "0")).join("");
                outHash.textContent = hex;
                resetPayUi();
                refreshWizard();
                updateButtons();
                return;
            }

            // 3) Otherwise hash file (if provided)
            if (f) {
                const buf = await crypto.subtle.digest("SHA-256", await f.arrayBuffer());
                const hex = [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, "0")).join("");
                outHash.textContent = hex;
                resetPayUi();
                refreshWizard();
                updateButtons();
                return;
            }

            // Nothing to hash
        });

        txid.addEventListener("input", updateButtons);

        textIn.addEventListener("input", () => {
            resetPayUi();
            refreshWizard();
            updateButtons();
        });

        fileIn.addEventListener("change", () => {
            resetPayUi();
            refreshWizard();
            updateButtons();
        });

        hashIn.addEventListener("input", () => {
            const v = (hashIn.value || "").trim();
            if (isHash(v)) {
                outHash.textContent = v.toLowerCase();
                resetPayUi();
            } else if (v.length === 0) {
                // ако изтриеш hash-а, не пипаме outHash автоматично
                // (можеш да решиш да го върнеш на "—" ако искаш)
            }
            updateButtons();
        });

        /* ================= backend helpers ================= */
        async function postJson(url, body) {
            const r = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body || {})
            });
            const j = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(j?.error || `HTTP ${r.status}`);
            return j;
        }

        /* ================= PAY + WRITE ================= */
        btnPay.addEventListener("click", async () => {
            const hash = outHash.textContent.trim();
            if (!isHash(hash)) return;

            // lock buttons during payment/write
            btnPay.disabled = true;
            btnHash.disabled = true;

            payBadge.textContent = "WAIT";
            payMsg.textContent = t("paying");

            try {
                // 1) create invoice
                const inv = await postJson("/api/ln/invoice", {
                    amountSat: 1000,
                    memo: "Proof " + hash.slice(0, 8),
                    expirySec: 900
                });

                bolt11.value = inv.payment_request || "";
                const ln = "lightning:" + (inv.payment_request || "");
                qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(ln);
                qrRow.style.display = "block";

                // 2) wait paid
                while (true) {
                    const st = await fetch("/api/ln/status/" + encodeURIComponent(inv.checking_id), { cache: "no-store" }).then(r => r.json());
                    if (st?.paid) break;
                    await new Promise(r => setTimeout(r, 2000));
                }

                payBadge.textContent = "PAID";
                payMsg.textContent = t("paid");

                // 3) write opreturn
                const out = await postJson("/api/opreturn", { hashHex: hash, network: "mainnet" });

                // 4) update UI
                txid.value = out.txid || "";
                mempoolLink.href = "https://mempool.space/tx/" + out.txid;
                mempoolLink.style.display = "inline-block";

                verifyBox.style.display = "flex";
                verifyBadge.className = "badge good";
                verifyBadge.textContent = "RECORDED";
                verifyMsg.textContent = t("done");

                refreshWizard();

                payBadge.textContent = "DONE";
                payMsg.textContent = t("done");

            } catch (e) {
                payBadge.textContent = "ERROR";
                payMsg.textContent = String(e?.message || e);
            } finally {
                btnHash.disabled = false;
                refreshWizard();
                updateButtons(); // re-enable pay/verify according to state
            }
        });

        /* ================= VERIFY (real check) ================= */
        btnVerify.addEventListener("click", async () => {
            const tid = txid.value.trim();
            const hash = outHash.textContent.trim().toLowerCase();

            if (!isTx(tid)) return;

            verifyBox.style.display = "flex";
            verifyBadge.className = "badge neutral";
            verifyBadge.textContent = "CHECK";
            verifyMsg.textContent = t("checking");

            mempoolLink.href = "https://mempool.space/tx/" + tid;
            mempoolLink.style.display = "inline-block";

            try {
                const r = await fetch("https://mempool.space/api/tx/" + tid, { cache: "no-store" });
                if (!r.ok) throw new Error("TX not found");
                const tx = await r.json();

                // If we have a hash, verify match in OP_RETURN outputs. If not, just show tx link.
                let found = false;
                if (isHash(hash)) {
                    found = (tx.vout || []).some(v =>
                        v.scriptpubkey_type === "op_return" &&
                        (v.scriptpubkey || "").toLowerCase().includes(hash)
                    );
                }

                if (isHash(hash) && found) {
                    verifyBadge.className = "badge good";
                    verifyBadge.textContent = "FOUND";
                    verifyMsg.textContent = t("done");
                } else if (isHash(hash) && !found) {
                    verifyBadge.className = "badge bad";
                    verifyBadge.textContent = "NOT FOUND";
                    verifyMsg.textContent = t("notFound");
                } else {
                    // No hash available → still useful to confirm the tx exists
                    verifyBadge.className = "badge neutral";
                    verifyBadge.textContent = "OK";
                    verifyMsg.textContent = t("txLoadedNoHash");
                }
            } catch {
                verifyBadge.className = "badge bad";
                verifyBadge.textContent = "ERROR";
                verifyMsg.textContent = t("verifyError");
            }
        });


        /* ================= tabs ================= */
        function setActiveTab(tab) {
            const wanted = tab || localStorage.getItem("tab") || "app";

            document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(s => s.classList.remove("active"));

            const btn = document.querySelector('.tab[data-tab="' + wanted + '"]') || document.querySelector('.tab[data-tab="app"]');
            const sec = document.getElementById("tab-" + (btn?.dataset?.tab || "app"));

            btn?.classList.add("active");
            sec?.classList.add("active");

            // Mobile menu active state
            const mi = document.querySelectorAll(".menu-item");
            mi.forEach(x => x.classList.remove("active"));
            const activeMi = document.querySelector('.menu-item[data-tab="' + (btn?.dataset?.tab || "app") + '"]');
            activeMi?.classList.add("active");

            localStorage.setItem("tab", btn?.dataset?.tab || "app");
        }

        document.querySelectorAll(".tab").forEach(btn => {
            btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
        });

        // Restore last tab
        setActiveTab();


        /* ================= mobile hamburger menu ================= */
        (function () {
            const menuBtn = document.getElementById("menuBtn");
            const menuPanel = document.getElementById("menuPanel");
            if (!menuBtn || !menuPanel) return;

            function closeMenu() {
                menuPanel.classList.remove("open");
                menuBtn.setAttribute("aria-expanded", "false");
            }

            function toggleMenu() {
                const open = menuPanel.classList.toggle("open");
                menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
            }

            menuBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                toggleMenu();
            });

            // Close when clicking outside
            document.addEventListener("click", () => closeMenu());

            // Prevent inside clicks from bubbling and closing immediately
            menuPanel.addEventListener("click", (e) => e.stopPropagation());

            // Hook menu items
            menuPanel.querySelectorAll(".menu-item").forEach(btn => {
                btn.addEventListener("click", () => {
                    setActiveTab(btn.dataset.tab);
                    closeMenu();
                });
            });

            // Close on resize to desktop
            window.addEventListener("resize", () => {
                if (window.innerWidth > 640) closeMenu();
            });
        })();



        /* ================= sticky tabs offset ================= */
        (function () {
            const headerEl = document.querySelector("header");
            const navEl = document.querySelector("nav.tabs");
            function updateOffset() {
                if (!headerEl || !navEl) return;
                const h = headerEl.getBoundingClientRect().height;
                navEl.style.top = Math.round(h) + "px";
            }
            window.addEventListener("resize", updateOffset);
            window.addEventListener("load", updateOffset);
            updateOffset();
        })();

        updateButtons();
    </script>

                <li><span class="icon">⛓️</span><span id="t_modalL2"></span></li>
                <li><span class="icon">🧾</span><span id="t_modalL3"></span></li>
            </ul>

            <div class="modal-note" id="t_modalNote"></div>

            <button class="primary modal-btn" id="modalCloseBtn"></button>
        </div>
    </div>
